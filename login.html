<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - TA Exchange</title>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            min-height: 100vh;
            display: flex;
        }

        /* Left Panel with Background Image */
        .login-left {
            flex: 1;
            background-image: url('https://taex007.wpenginepowered.com/wp-content/uploads/2022/01/cj-dayrit-ogOCki8gUiA-unsplash-scaled.jpeg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Right Panel with Form */
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            padding: 40px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo img {
            height: 60px;
            width: auto;
        }

        /* Header with Sign In and Create Account */
        .login-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark, #1a1a2e);
            margin: 0;
        }

        .login-header a {
            text-decoration: none;
            color: var(--primary, #5B5FC7);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .login-header a:hover {
            text-decoration: underline;
        }

        /* Error Message */
        .error-message {
            display: none;
            background-color: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .error-message.show {
            display: block;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Form Group */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 6px;
            display: none;
        }

        /* Input Fields */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: #d1d5db;
            font-size: 16px;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary, #5B5FC7);
            box-shadow: 0 0 0 3px rgba(91, 95, 199, 0.1);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        /* Password Field with Show/Hide Toggle */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #d1d5db;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .toggle-password:hover {
            color: #9ca3af;
        }

        /* Remember Me and Forgot Password */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary, #5B5FC7);
        }

        .remember-me label {
            cursor: pointer;
            color: #4b5563;
            margin: 0;
            display: inline;
            font-size: 14px;
        }

        .forgot-password {
            text-decoration: none;
            color: var(--primary, #5B5FC7);
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Login Button */
        .login-button {
            background-color: var(--primary, #5B5FC7);
            color: white;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }

        .login-button:hover {
            background-color: #4a4db5;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .login-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        /* Footer Links */
        .login-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
        }

        .login-footer a {
            text-decoration: none;
            color: #6b7280;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: var(--primary, #5B5FC7);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .login-left {
                display: none;
            }

            .login-right {
                flex: 1;
                padding: 20px;
                min-height: 100vh;
            }

            .login-container {
                max-width: 100%;
            }

            .login-logo {
                margin-bottom: 30px;
            }

            .login-logo img {
                height: 50px;
            }

            .login-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .login-header h1 {
                font-size: 24px;
                width: 100%;
            }

            .login-header a {
                align-self: flex-end;
            }

            .login-footer {
                gap: 10px;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 480px) {
            .login-right {
                padding: 16px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .form-group input {
                font-size: 16px;
            }

            .login-footer {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Left Panel -->
    <div class="login-left"></div>

    <!-- Right Panel -->
    <div class="login-right">
        <div class="login-container">
            <!-- Logo -->
            <div class="login-logo">
                <img src="https://taex007.wpenginepowered.com/wp-content/uploads/2021/12/talogosmallv200.png" alt="TA Exchange Logo">
            </div>

            <!-- Header -->
            <div class="login-header">
                <h1>Sign in</h1>
                <a href="apply.html">Create an Account</a>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Email Address"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Password"
                            required
                            autocomplete="current-password"
                        >
                        <button
                            type="button"
                            class="toggle-password"
                            id="togglePassword"
                            aria-label="Toggle password visibility"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me and Forgot Password -->
                <div class="form-footer">
                    <div class="remember-me">
                        <input
                            type="checkbox"
                            id="rememberMe"
                            name="rememberMe"
                        >
                        <label for="rememberMe">Remember Me</label>
                    </div>
                    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-button">Log In</button>
            </form>

            <!-- Footer Links -->
            <div class="login-footer">
                <a href="terms-of-service.html">Terms of Service</a>
                <a href="privacy-policy.html">Privacy Policy</a>
            </div>
        </div>
    </div>

    <!-- Auth System -->
    <script src="js/auth.js"></script>

    <!-- Login Script -->
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof TAAuth !== 'undefined' && TAAuth.isLoggedIn()) {
                // Redirect to groups.html or redirect param
                const params = new URLSearchParams(window.location.search);
                const redirectUrl = params.get('redirect') || 'groups.html';
                window.location.href = redirectUrl;
                return;
            }

            // Form submission
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');

            // Password toggle
            togglePassword.addEventListener('click', function() {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';

                const icon = this.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });

            // Form submit
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Clear previous error
                errorMessage.classList.remove('show');
                errorMessage.textContent = '';

                // Disable button during submission
                const loginButton = loginForm.querySelector('.login-button');
                const originalText = loginButton.textContent;
                loginButton.disabled = true;
                loginButton.textContent = 'Signing in...';

                // Call auth system
                if (typeof TAAuth !== 'undefined' && TAAuth.login) {
                    const result = TAAuth.login(email, password);
                    loginButton.disabled = false;
                    loginButton.textContent = originalText;

                    if (result.success) {
                        const params = new URLSearchParams(window.location.search);
                        const redirectUrl = params.get('redirect') || 'groups.html';
                        window.location.href = redirectUrl;
                    } else {
                        errorMessage.textContent = result.error || 'Login failed. Please check your credentials and try again.';
                        errorMessage.classList.add('show');
                    }
                } else {
                    loginButton.disabled = false;
                    loginButton.textContent = originalText;
                    errorMessage.textContent = 'Authentication system is not available.';
                    errorMessage.classList.add('show');
                }
            });
        });
    </script>
</body>
</html>
