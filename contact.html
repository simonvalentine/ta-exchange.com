<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TA Exchange</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <!-- Hero Section -->
    <section class="hero-section" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
        <div class="container">
            <h1 class="hero-title" style="color: white;">Contact Us</h1>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-wrapper">
                <!-- Contact Form -->
                <div class="contact-form-wrapper">
                    <h2>Get in Touch</h2>
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                    <div class="success-message" id="successMessage" style="display: none;">
                        <i class="fas fa-check-circle"></i>
                        <p>Thank you! Your message has been sent successfully. We'll get back to you soon.</p>
                    </div>
                </div>

                <!-- Contact Info -->
                <div class="contact-info-wrapper">
                    <h2>Contact Information</h2>

                    <div class="info-item">
                        <div class="info-icon" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="info-content">
                            <h3>Email</h3>
                            <p><a href="mailto:contact@ta.exchange">contact@ta.exchange</a></p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="info-content">
                            <h3>Location</h3>
                            <p>Hamilton, New Zealand</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
                            <i class="fas fa-globe"></i>
                        </div>
                        <div class="info-content">
                            <h3>Follow Us</h3>
                            <div class="social-links">
                                <a href="#" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                                <a href="#" title="Twitter"><i class="fab fa-twitter"></i></a>
                                <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
                                <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
                            </div>
                        </div>
                    </div>

                    <div class="office-hours">
                        <h3>Office Hours</h3>
                        <p>Monday - Friday: 9:00 AM - 5:00 PM NZDT</p>
                        <p>We typically respond within 24-48 hours</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('header').innerHTML = renderHeader('contact');
        document.getElementById('footer').innerHTML = renderFooter();

        // Handle form submission
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Hide form and show success message
            document.querySelector('.contact-form').style.display = 'none';
            document.getElementById('successMessage').style.display = 'flex';

            // Reset form
            this.reset();

            // Hide success message after 5 seconds and show form again
            setTimeout(() => {
                document.querySelector('.contact-form').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        });
    </script>

    <style>
        .hero-section {
            padding: 60px 20px;
            text-align: center;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .contact-section {
            padding: 80px 20px;
            background-color: #f9fafb;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            background: white;
            padding: 60px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }

        .contact-form-wrapper h2,
        .contact-info-wrapper h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin: 0 0 30px 0;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .success-message {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
            padding: 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #065f46;
        }

        .success-message i {
            font-size: 24px;
            color: #10b981;
        }

        .success-message p {
            margin: 0;
            font-size: 14px;
        }

        .info-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            flex-shrink: 0;
        }

        .info-content h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 8px 0;
        }

        .info-content p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
        }

        .info-content a {
            color: #7c3aed;
            text-decoration: none;
        }

        .info-content a:hover {
            text-decoration: underline;
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7c3aed;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
        }

        .office-hours {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
        }

        .office-hours h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 10px 0;
        }

        .office-hours p {
            margin: 0 0 5px 0;
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 32px;
            }

            .contact-wrapper {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 40px 20px;
            }

            .contact-form-wrapper h2,
            .contact-info-wrapper h2 {
                font-size: 24px;
            }
        }
    </style>
</body>
</html>
