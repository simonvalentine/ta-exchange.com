<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups - TA Exchange</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        /* Hero Banner */
        .hero-banner {
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            margin-bottom: 60px;
        }

        .hero-banner h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero-banner p {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Groups Grid Container */
        .groups-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
        }

        /* Group Card */
        .group-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .group-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .group-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
        }

        .group-card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .group-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .group-tag {
            display: inline-block;
            background: #f3e8ff;
            color: #8b5cf6;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .group-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .group-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            line-height: 1.5;
            flex-grow: 1;
        }

        .group-card-stats {
            display: flex;
            gap: 20px;
            padding: 16px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 16px;
            font-size: 13px;
            color: #666;
        }

        .group-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .group-stat i {
            color: #8b5cf6;
            font-size: 14px;
        }

        .group-card-footer {
            display: flex;
            gap: 10px;
        }

        .btn-view-group {
            flex: 1;
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-view-group:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .groups-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .hero-banner h1 {
                font-size: 36px;
            }
        }

        @media (max-width: 768px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }

            .hero-banner {
                padding: 60px 20px;
                margin-bottom: 40px;
            }

            .hero-banner h1 {
                font-size: 28px;
            }

            .hero-banner p {
                font-size: 16px;
            }

            .group-card-stats {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* Loading and Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: #d0d0d0;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            font-size: 24px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <!-- Hero Banner -->
    <div class="hero-banner">
        <h1>Groups</h1>
        <p>Connect with TA professionals in specialized communities</p>
    </div>

    <!-- Groups Container -->
    <div class="groups-container">
        <div class="groups-grid" id="groupsGrid"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-users"></i>
            <h2>No Groups Yet</h2>
            <p>Check back soon for new professional groups to join</p>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="js/auth.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Require authentication
            TAAuth.requireAuth();

            // Render header and footer
            document.getElementById('header-container').innerHTML = renderHeader('groups');
            document.getElementById('footer-container').innerHTML = renderFooter();

            // Render groups
            renderGroups();
        });

        function renderGroups() {
            const grid = document.getElementById('groupsGrid');
            const emptyState = document.getElementById('emptyState');

            if (!window.TAGroups || window.TAGroups.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.innerHTML = window.TAGroups.map(group => `
                <div class="group-card">
                    <img src="${group.image}" alt="${group.name}" class="group-card-image">
                    <div class="group-card-content">
                        <div class="group-card-header">
                            <span class="group-tag">${group.tag}</span>
                        </div>
                        <h3>${group.name}</h3>
                        <p>${group.description.substring(0, 100)}${group.description.length > 100 ? '...' : ''}</p>
                        <div class="group-card-stats">
                            <div class="group-stat">
                                <i class="fas fa-users"></i>
                                <span>${group.memberCount} Members</span>
                            </div>
                            <div class="group-stat">
                                <i class="fas fa-comments"></i>
                                <span>${group.topics} Topics</span>
                            </div>
                        </div>
                        <div class="group-card-footer">
                            <a href="group.html?id=${group.id}" class="btn-view-group">
                                <span>View Group</span>
                                <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
